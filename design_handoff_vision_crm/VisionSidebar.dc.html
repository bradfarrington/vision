<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/vision-design-system-7d86eb4e-98d4-48b5-899a-963640d95f74/styles.css">
  <script src="_ds/vision-design-system-7d86eb4e-98d4-48b5-899a-963640d95f74/_ds_bundle.js"></script>
</helmet>
<div style="width:76px;height:100%;min-height:100%;box-sizing:border-box;display:flex;flex-dire-ction:column;flex-direction:column;align-items:center;padding:10px 0 18px;font-family:'Inter',system-ui,sans-serif">
  <nav style="display:flex;flex-direction:column;align-items:center;gap:8px">
    <sc-for list="{{ items }}" as="it" hint-placeholder-count="10">
      <div title="{{ it.label }}" style="width:44px;height:44px;border-radius:999px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:{{ it.bg }};color:{{ it.color }};border:{{ it.border }};box-shadow:{{ it.shadow }}">{{ it.icon }}</div>
    </sc-for>
  </nav>
  <div style="margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:8px">
    <sc-for list="{{ bottomItems }}" as="it" hint-placeholder-count="2">
      <div title="{{ it.label }}" style="width:44px;height:44px;border-radius:999px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:{{ it.bg }};color:{{ it.color }};border:{{ it.border }};box-shadow:{{ it.shadow }}">{{ it.icon }}</div>
    </sc-for>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:76,&quot;height&quot;:760},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Dashboard&quot;,&quot;Customers&quot;,&quot;Leads&quot;,&quot;Contracts&quot;,&quot;Diary&quot;,&quot;Quoting&quot;,&quot;Stock&quot;,&quot;Financials&quot;,&quot;Communications&quot;,&quot;Marketing&quot;,&quot;Workflows&quot;,&quot;Settings&quot;],&quot;default&quot;:&quot;Dashboard&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const active = this.props.active ?? "Dashboard";
    const P = React.createElement;
    const icon = (kids) => P("svg", { width: 19, height: 19, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 1.75, strokeLinecap: "round", strokeLinejoin: "round", style: { flex: "none" } }, kids);
    const path = (d, i) => P("path", { d, key: i });
    const mainDefs = [
      ["Dashboard", ["M3 3h7v7H3z", "M14 3h7v7h-7z", "M14 14h7v7h-7z", "M3 14h7v7H3z"]],
      ["Customers", ["M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2", "M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z", "M22 21v-2a4 4 0 0 0-3-3.87", "M16 3.13a4 4 0 0 1 0 7.75"]],
      ["Leads", ["M3 4h18l-7 8v6l-4 2v-8L3 4z"]],
      ["Contracts", ["M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z", "M14 2v6h6", "M9 15l2 2 4-4"]],
      ["Diary", ["M3 5h18v16H3z", "M16 2v6", "M8 2v6", "M3 11h18"]],
      ["Quoting", ["M12 20h9", "M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"]],
      ["Stock", ["M21 8l-9-5-9 5v8l9 5 9-5V8z", "M3 8l9 5 9-5", "M12 13v8"]],
      ["Financials", ["M2 7h20v11H2z", "M12 12.5a2 2 0 1 0 0-.01", "M6 12.5h.01", "M18 12.5h.01"]],
      ["Communications", ["M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"]],
      ["Marketing", ["M3 11l18-6v14L3 13v-2z", "M11.6 16.8a3 3 0 1 1-5.8-1.6"]],
      ["Workflows", ["M3 3h6v6H3z", "M15 15h6v6h-6z", "M9 6h5a2 2 0 0 1 2 2v7"]],
    ];
    const bottomDefs = [
      ["Notifications", ["M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9", "M13.7 21a2 2 0 0 1-3.4 0"]],
      ["Settings", ["M4 21v-7", "M4 10V3", "M12 21v-9", "M12 8V3", "M20 21v-5", "M20 12V3", "M2 14h4", "M10 8h4", "M18 16h4"]],
    ];
    const mk = ([label, paths]) => {
      const on = label === active;
      return {
        label,
        icon: icon(paths.map(path)),
        bg: on ? "#2f7de1" : "#ffffff",
        color: on ? "#ffffff" : "#566173",
        border: on ? "1px solid #2f7de1" : "1px solid #e2e7ee",
        shadow: on ? "0 4px 12px rgba(16,20,24,.12)" : "0 1px 2px rgba(16,20,24,.06)",
      };
    };
    return { items: mainDefs.map(mk), bottomItems: bottomDefs.map(mk) };
  }
}
</script>
</body>
</html>
